<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>immersalab — immersive technology studio</title>
    <meta name="description" content="immersalab is a 3D creative lab building immersive simulations and tools.">
    <link rel="icon" type="image/png" href="assets/images/Glint3DIcon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css?v=13">
</head>

<body class="landing-slate">

    <!-- Full-viewport fluid sim background -->
    <canvas class="liquid-glass-canvas" aria-hidden="true"></canvas>

    <!-- Gradient vignette overlay for depth -->
    <div class="landing-vignette" aria-hidden="true"></div>

    <main id="main" class="landing-main">

        <!-- Top status -->
        <p class="landing-top-status">COMING SOON.</p>

        <!-- Brand + status -->
        <section class="landing-hero">
            <div class="landing-hero__brand">
                <h1 class="landing-hero__name">immersalab</h1>
                <img class="landing-hero__icon" src="assets/images/Glint3DIcon.png" alt="" aria-hidden="true" width="40"
                    height="40">
            </div>
            <p class="landing-hero__tagline">making 3d easy</p>
            <p class="landing-hero__hint">play with the fluid sim if you're bored :)</p>
        </section>

    </main>

    <!-- Minimal footer -->
    <footer class="landing-footer">
        <span>© 2026 immersalab</span>
    </footer>

    <script>
        document.documentElement.setAttribute('data-theme', 'dark');
    </script>
    <script src="js/fluid-sim.js"></script>
</body>

</html>
